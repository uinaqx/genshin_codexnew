name: Validate macOS settings helper

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate helper syntax and safety
        run: |
          zsh -n "Open Klee Theme Settings on macOS.command"
          ! grep -R -- '--remote-debugging-port' "Open Klee Theme Settings on macOS.command"
          grep -q "codex://settings" "Open Klee Theme Settings on macOS.command"
