name: Build Windows safety installer

on:
  push:
    branches: [main]
    paths:
      - "manager/**"
      - "windows/**"
      - "installer/windows/**"
      - "docs/previews/**"
      - "themes/**"
      - "schema/**"
      - "tests/**"
      - "README.md"
      - "LICENSE"
      - "NOTICE.md"
      - ".github/workflows/windows-installer.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: windows-safety-installer
  cancel-in-progress: true

env:
  APP_VERSION: "2.0.0"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate safety contracts
        run: |
          node tests/test-palette.mjs
          node tests/test-windows-safety.mjs

      - name: Parse PowerShell sources
        shell: powershell
        run: |
          $files = @(
            "manager\KleeSafetyCenter.ps1",
            "windows\Clean-Klee-Codex-Remnants.ps1",
            "tests\Test-CleanupSandbox.ps1"
          )
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "${file}: $($_.Message)" }
              exit 1
            }
          }

      - name: Run cleanup sandbox integration test
        shell: powershell
        run: tests\Test-CleanupSandbox.ps1

      - name: Assemble minimal payload
        shell: powershell
        run: |
          $payload = Join-Path $PWD "installer\windows\payload"
          if (Test-Path -LiteralPath $payload) { Remove-Item -LiteralPath $payload -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $payload | Out-Null
          foreach ($folder in @("manager", "windows", "docs\previews", "themes", "schema")) {
            $source = Join-Path $PWD $folder
            $destination = Join-Path $payload $folder
            New-Item -ItemType Directory -Force -Path (Split-Path -Parent $destination) | Out-Null
            Copy-Item -LiteralPath $source -Destination $destination -Recurse -Force
          }
          foreach ($file in @("README.md", "LICENSE", "NOTICE.md", "ASSET_PROVENANCE.md")) {
            Copy-Item -LiteralPath (Join-Path $PWD $file) -Destination $payload -Force
          }
          Set-Content -LiteralPath (Join-Path $payload "VERSION") -Value $env:APP_VERSION -Encoding ascii

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: powershell
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path -LiteralPath $iscc)) { throw "ISCC.exe was not found" }
          & $iscc "/DAppVersion=$env:APP_VERSION" "installer\windows\KleeCodexSkin.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $installer = Get-Item "installer\windows\output\KleeCodexSafety-Setup-v$env:APP_VERSION.exe"
          if ($installer.Length -lt 25KB) { throw "Installer output is missing or unexpectedly small" }
          $hash = (Get-FileHash -Algorithm SHA256 $installer.FullName).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content -LiteralPath "$($installer.FullName).sha256" -Encoding ascii
          Write-Host "SHA256: $hash"

      - uses: actions/upload-artifact@v4
        with:
          name: KleeCodexSafety-Setup-v2.0.0
          path: |
            installer/windows/output/KleeCodexSafety-Setup-v2.0.0.exe
            installer/windows/output/KleeCodexSafety-Setup-v2.0.0.exe.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:APP_VERSION"
          $asset = "installer\windows\output\KleeCodexSafety-Setup-v$env:APP_VERSION.exe"
          $hash = "$asset.sha256"
          $notes = ".github\release-v2.0.0.md"
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset $hash --clobber --repo $env:GITHUB_REPOSITORY
            gh release edit $tag --notes-file $notes --title "可莉 Codex 安全中心 v$env:APP_VERSION" --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag $asset $hash --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title "可莉 Codex 安全中心 v$env:APP_VERSION" --notes-file $notes
          }
