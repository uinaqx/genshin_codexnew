name: Validate Klee theme

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate theme manifest and assets
        run: node tests/test-klee-theme.mjs
